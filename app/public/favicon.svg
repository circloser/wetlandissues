<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- 습지 이슈 맵 파비콘 — 물 위에 자란 갈대/부들(습지 상징) -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a90ff"/>
      <stop offset="1" stop-color="#2f6fe0"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="30" height="30" rx="8" fill="url(#g)"/>

  <!-- 갈대/부들: 줄기 + 이삭 머리 -->
  <g fill="#ffffff">
    <rect x="11.05" y="12.5" width="1.9" height="12" rx="0.95"/>
    <ellipse cx="12" cy="9.4" rx="1.7" ry="3.4"/>
    <rect x="18.05" y="11" width="1.9" height="13.5" rx="0.95"/>
    <ellipse cx="19" cy="7.4" rx="1.7" ry="3.4"/>
  </g>
  <!-- 가느다란 잎 -->
  <path d="M22.5 24.5 Q24.2 15.5 21 10.8" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round"/>

  <!-- 물결 -->
  <g fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round">
    <path d="M6 24.6 q2.5 -2.1 5 0 t5 0 t5 0 t5 0"/>
  </g>
</svg>
