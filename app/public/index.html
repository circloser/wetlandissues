<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>습지 이슈 맵</title>
  <link rel="stylesheet" href="/vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="/vendor/leaflet.markercluster/MarkerCluster.css" />
  <link rel="stylesheet" href="/vendor/leaflet.markercluster/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="app-brand">
      <span class="app-logo" aria-hidden="true">습</span>
      <h1 class="app-title">습지 이슈 맵</h1>
    </div>

    <div class="header-controls">
      <div id="wetland-search" class="wetland-search">
        <input
          id="wetland-search-input"
          class="wetland-search-input"
          type="text"
          placeholder="습지 이름 검색"
          autocomplete="off"
          aria-label="습지 이름 검색"
        />
        <ul id="wetland-search-results" class="wetland-search-results" hidden role="listbox" aria-label="습지 검색 결과"></ul>
      </div>

      <button
        id="date-filter-toggle-btn"
        class="date-filter-toggle-btn"
        type="button"
        aria-expanded="false"
        aria-controls="date-filter"
      >
        <span class="date-filter-toggle-icon" aria-hidden="true">📅</span>
        <span class="date-filter-toggle-label">기간</span>
      </button>

      <div id="date-filter" class="date-filter" role="group" aria-label="기간 필터">
        <span class="date-filter-presets" role="group" aria-label="빠른 기간 선택">
          <button type="button" class="date-filter-preset-btn" data-days="1">1일</button>
          <button type="button" class="date-filter-preset-btn" data-days="3">3일</button>
          <button type="button" class="date-filter-preset-btn" data-days="7">1주</button>
          <button type="button" class="date-filter-preset-btn" data-days="30">1달</button>
        </span>
        <input id="date-filter-from" class="date-filter-input" type="date" aria-label="시작일" />
        <span class="date-filter-tilde" aria-hidden="true">~</span>
        <input id="date-filter-to" class="date-filter-input" type="date" aria-label="종료일" />
        <button id="date-filter-apply-btn" class="date-filter-btn" type="button">적용</button>
        <button id="date-filter-clear-btn" class="date-filter-btn date-filter-btn--clear" type="button">해제</button>
        <span id="date-filter-status" class="date-filter-status" hidden role="status"></span>
      </div>
    </div>

    <button id="collect-btn" class="collect-btn" type="button">
      <span id="collect-btn-label">뉴스 수집</span>
      <span id="collect-spinner" class="spinner" hidden></span>
    </button>
  </header>

  <main class="app-main">
    <div id="map-pane" class="map-pane">
      <div id="map"></div>
    </div>

    <div id="split-handle" class="split-handle" role="separator" aria-orientation="vertical" aria-label="지도·뉴스 패널 크기 조절" tabindex="0"></div>

    <aside id="side-panel" class="side-panel" role="dialog" aria-label="뉴스 패널">
      <div class="side-panel-handle" aria-hidden="true"></div>
      <div class="panel-header">
        <h2 id="panel-title" class="panel-title">전체 최신 뉴스</h2>
        <span id="panel-collecting-indicator" class="panel-collecting-indicator" hidden>
          <span class="spinner spinner--sub" aria-hidden="true"></span>
          <span>최신 뉴스 확인 중...</span>
        </span>
        <button id="panel-show-all-btn" class="panel-show-all-btn" type="button" hidden>전체 보기</button>
        <button id="panel-close-btn" class="panel-close-btn" type="button" aria-label="닫기">&times;</button>
      </div>
      <div class="panel-sort-row">
        <label for="issue-sort-select" class="issue-sort-label">정렬</label>
        <select id="issue-sort-select" class="issue-sort-select" aria-label="뉴스 정렬 기준">
          <option value="newest">최신순</option>
          <option value="oldest">오래된순</option>
          <option value="wetland">습지명순</option>
          <option value="status">미점검 먼저</option>
        </select>
        <label class="negative-filter-toggle">
          <input id="negative-filter-checkbox" type="checkbox" />
          <span>부정보도만</span>
        </label>
      </div>
      <div id="panel-content" class="panel-content">
        <!-- 뉴스 목록이 JS로 채워짐 -->
      </div>
    </aside>
  </main>

  <script src="/vendor/leaflet/leaflet.js"></script>
  <script src="/vendor/leaflet.markercluster/leaflet.markercluster.js"></script>
  <script src="/app.js"></script>
</body>
</html>
