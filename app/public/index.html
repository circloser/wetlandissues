<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>습지 이슈 맵</title>
  <link rel="stylesheet" href="/vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="app-brand">
      <span class="app-logo" aria-hidden="true">습</span>
      <h1 class="app-title">습지 이슈 맵</h1>
    </div>

    <div class="header-controls">
      <div id="wetland-search" class="wetland-search">
        <input
          id="wetland-search-input"
          class="wetland-search-input"
          type="text"
          placeholder="습지 이름 검색"
          autocomplete="off"
          aria-label="습지 이름 검색"
        />
        <ul id="wetland-search-results" class="wetland-search-results" hidden role="listbox" aria-label="습지 검색 결과"></ul>
      </div>

      <button
        id="date-filter-toggle-btn"
        class="date-filter-toggle-btn"
        type="button"
        aria-expanded="false"
        aria-controls="date-filter"
      >
        <span class="date-filter-toggle-icon" aria-hidden="true">📅</span>
        <span class="date-filter-toggle-label">기간</span>
      </button>

      <div id="date-filter" class="date-filter" role="group" aria-label="기간 필터">
        <input id="date-filter-from" class="date-filter-input" type="date" aria-label="시작일" />
        <span class="date-filter-tilde" aria-hidden="true">~</span>
        <input id="date-filter-to" class="date-filter-input" type="date" aria-label="종료일" />
        <button id="date-filter-apply-btn" class="date-filter-btn" type="button">적용</button>
        <button id="date-filter-clear-btn" class="date-filter-btn date-filter-btn--clear" type="button">해제</button>
      </div>
    </div>

    <button id="collect-btn" class="collect-btn" type="button">
      <span id="collect-btn-label">뉴스 수집</span>
      <span id="collect-spinner" class="spinner" hidden></span>
    </button>
  </header>

  <div id="date-filter-status" class="date-filter-status" hidden role="status"></div>

  <main class="app-main">
    <div id="map"></div>

    <aside id="side-panel" class="side-panel" hidden role="dialog" aria-label="습지 상세 정보">
      <div class="side-panel-handle" aria-hidden="true"></div>
      <button id="panel-close-btn" class="panel-close-btn" type="button" aria-label="닫기">&times;</button>
      <div id="panel-content" class="panel-content">
        <!-- 습지 클릭 시 JS로 채워짐 -->
      </div>
    </aside>
  </main>

  <script src="/vendor/leaflet/leaflet.js"></script>
  <script src="/app.js"></script>
</body>
</html>
